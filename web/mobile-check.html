<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f1e8" />
    <title>スマホ接続チェック</title>
    <style>
      body {
        display: grid;
        min-height: 100dvh;
        place-items: center;
        margin: 0;
        background: #f5f1e8;
        color: #202124;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 14px;
        width: min(480px, calc(100% - 36px));
      }

      h1 {
        margin: 0;
        font-size: 24px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #5f6368;
        font-size: 15px;
        line-height: 1.6;
      }

      code {
        display: block;
        overflow-wrap: anywhere;
        border: 1px solid #d7d2c7;
        border-radius: 8px;
        background: #fffaf1;
        color: #202124;
        padding: 12px;
        font-size: 14px;
      }

      a {
        color: #0b57d0;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>スマホ接続チェック OK</h1>
      <p>この画面が見えていれば、スマホからPCのPWAプレビューサーバーへ到達できています。</p>
      <code>次に / を開いて黒画面になる場合は、ネットワークではなく本体アプリの初期化を調べます。</code>
      <a href="/">Gemma 4 を開く</a>
    </main>
  </body>
</html>
