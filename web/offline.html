<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f1e8" />
    <title>Gemma 4 12B - PCに接続できません</title>
    <style>
      body {
        display: grid;
        min-height: 100dvh;
        place-items: center;
        margin: 0;
        background: #f5f1e8;
        color: #202124;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 12px;
        width: min(420px, calc(100% - 40px));
      }

      .mark {
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border-radius: 12px;
        background: #202124;
        color: #f5f1e8;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: #5f6368;
        font-size: 14px;
        line-height: 1.6;
      }

      a {
        color: #0b57d0;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">G4</div>
      <h1>PCに接続できません</h1>
      <p>同じWi-FiのPC版に届かない時に表示されます。スマホ単体画面を開くか、PC側のスマホ同期サーバーを起動してから再読み込みしてください。</p>
      <a href="/mobile.html">スマホ単体画面を開く</a>
      <a href="/mobile-check.html">接続チェック</a>
    </main>
  </body>
</html>
