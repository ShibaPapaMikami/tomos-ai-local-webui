name: Build Windows installer
run-name: Build Windows installer (${{ inputs.version || github.ref_name }})

on:
  workflow_dispatch:
    inputs:
      version:
        description: "App version. Leave blank to read server.py."
        required: false
        default: ""
  push:
    tags:
      - "v*"

jobs:
  windows-msi:
    name: Windows MSI
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.0.6
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build MSI
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}") {
            python scripts/make-windows-msi.py "${{ github.event.inputs.version }}"
          } else {
            python scripts/make-windows-msi.py
          }
      - name: Write MSI summary
        shell: pwsh
        run: |
          $version = "${{ inputs.version || github.ref_name }}".TrimStart("v")
          "## TOMOS AI v$version" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          "- Windows artifact: TOMOS_AI-v$version-windows.msi" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: tomos-ai-windows-msi-${{ inputs.version || github.ref_name }}
          path: dist/*.msi
